<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Galerie s Vue.js</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/vue-carousel/dist/vue-carousel.min.css">
    <style>
      #app {
        margin: 0 auto;
        max-width: 800px;
      }
      img {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <carousel :perPageCustom="{ 480: 2, 768: 3, 1200: 4 }">
        <slide v-for="(image, index) in images" :key="index">
          <img :src="'/fotky/' + image" alt="Image">
        </slide>
      </carousel>
    </div>
    <script src="./vue.js"></script>
    <script src="https://unpkg.com/vue-carousel@0.18.0"></script>
    <script>
      var app = new Vue({
        el: '#app',
        data: {
          images: [],
          path: './fotky/'
        },
        mounted() {
          this.getImages();
        },
        methods: {
          getImages() {
            const images = require.context(this.path, false, /\.(png|jpe?g|svg)$/);
            this.images = images.keys().map(key => images(key));
          }
        }
      });
    </script>
  </body>
</html>
